repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.8.0
    hooks:
      - id: golangci-lint-full

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-handler-executable
        name: check handler.py executable
        entry: bash -c 'for f in plugins/*/handler.py; do [ -x "$f" ] || { echo "$f is not executable"; exit 1; }; done'
        language: system
        always_run: true
        pass_filenames: false

      - id: ty
        name: ty
        entry: bash -c 'for d in plugins/*/; do [ -f "$d/handler.py" ] && .venv/bin/ty check --extra-search-path "$d" "$d" || true; done'
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/pytest -x -q
        language: system
        types: [python]
        pass_filenames: false

      - id: go-fmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && go vet ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && go test ./...'
        language: system
        types: [go]
        pass_filenames: false
