version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

linters-settings:
  govet:
    enable-all: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-naming
      - name: error-return
      - name: exported
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: var-naming
  gosec:
    excludes:
      - G304  # file inclusion via variable (expected for plugin loading)

issues:
  exclude-dirs:
    - design
    - staging
