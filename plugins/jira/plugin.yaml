name: jira
version: "0.2.0"
description: "Jira integration for issue tracking and project management"

execution: persistent
handler: ./handler.py

context_files:
  - context.md

services:
  auth:
    select: "${JIRA_AUTH_TYPE:-auto}"
    variants:
      cloud:
        type: basic
        username: "${JIRA_EMAIL}"
        password: "${JIRA_TOKEN}"
      server-token:
        type: bearer
        token: "${JIRA_TOKEN}"
      server-kerberos:
        type: kerberos/spnego
        spn: "HTTP@${JIRA_HOST}"
  http:
    base_url: "${JIRA_URL}"
  cache:
    enabled: true
    namespace: jira
    default_ttl: 300

config:
  jira_url: "${JIRA_URL}"

tools:
  - name: jira_get_myself
    access: read
    description: >
      Get the authenticated user's Jira profile. Returns accountId,
      displayName, emailAddress, active status, and timeZone.
      Cached for 1 hour.
    params: {}

  - name: jira_search
    access: read
    description: >
      Search Jira issues using JQL. Returns brief per-issue summaries
      (key, summary, status, assignee, priority) by default. Set
      brief=false to get full issue data. Results are cached.
    params:
      jql:
        type: string
        required: true
        description: "JQL query string"
      max_results:
        type: integer
        default: 50
        description: "Maximum number of results (1-200)"
      fields:
        type: string
        default: "summary,status,assignee,priority"
        description: "Comma-separated list of Jira fields to fetch"
      brief:
        type: boolean
        default: true
        description: "Return compact per-issue summaries (true) or full data (false)"

  - name: jira_get_issues
    access: read
    description: >
      Get one or more Jira issues by key. Returns brief per-issue
      summaries by default. Set brief=false for full data. Fetches
      in batches via JQL for efficiency.
    params:
      issue_keys:
        type: string
        required: true
        description: "Comma-separated issue keys (e.g. PROJ-123,PROJ-456)"
      fields:
        type: string
        default: "summary,status,assignee,priority"
        description: "Comma-separated list of Jira fields to fetch"
      brief:
        type: boolean
        default: true
        description: "Return compact per-issue summaries (true) or full data (false)"

  - name: jira_get_user
    access: read
    description: >
      Look up a Jira user by username, email, or display name. Use
      "me", "myself", or "currentUser" to get the authenticated user.
      Returns accountId, displayName, emailAddress, active, timeZone.
    params:
      username:
        type: string
        required: true
        description: "Username, email, display name, or alias (me/myself/currentUser)"

  - name: jira_get_transitions
    access: read
    description: >
      Get available workflow transitions for a Jira issue. Use before
      jira_transition_issue to find valid transition IDs and names.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"

  - name: jira_get_resolutions
    access: read
    description: >
      Get all available issue resolution values. Use before
      jira_transition_issue to find valid resolution names for
      transitions that require one (e.g. Done, Closed).
    params: {}

  - name: jira_get_link_types
    access: read
    description: >
      List all available issue link types (e.g. Blocks, Clones,
      Duplicates). Use before jira_add_issue_link to find valid
      link type names.
    params: {}

  # --- Phase 2: Write Tools ---

  - name: jira_create_issue
    access: write
    description: >
      Create a new Jira issue. Defaults to dry_run=true which returns
      a preview without creating. Set dry_run=false to create.
    params:
      project:
        type: string
        required: true
        description: "Project key (e.g. PROJ)"
      issue_type:
        type: string
        required: true
        description: "Issue type name (e.g. Bug, Story, Task, Epic)"
      summary:
        type: string
        required: true
        description: "Issue summary/title"
      description:
        type: string
        description: "Issue description (plain text, converted to ADF for Cloud)"
      assignee:
        type: string
        description: "Assignee accountId (Cloud) or username (Server)"
      priority:
        type: string
        description: "Priority name (e.g. High, Medium, Low)"
      labels:
        type: array
        items:
          type: string
        description: "List of labels"
      components:
        type: array
        items:
          type: string
        description: "List of component names"
      custom_fields:
        type: array
        description: "List of custom field objects to set on the new issue"
        items:
          type: object
          required: [field_id, value]
          properties:
            field_id:
              type: string
              description: "Custom field ID (must match customfield_NNNNN)"
            value:
              description: "Value to set (type depends on field_type)"
            field_type:
              type: string
              default: "auto"
              description: "Type hint: auto, text, number, select, multi-select, version, or user"
      dry_run:
        type: boolean
        default: true
        description: "Preview only (true) or create for real (false)"

  - name: jira_add_comment
    access: write
    description: >
      Add a comment to a Jira issue. Defaults to dry_run=true.
      Uses ADF format for Cloud instances.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      comment:
        type: string
        required: true
        description: "Comment text"
      dry_run:
        type: boolean
        default: true

  - name: jira_edit_comment
    access: write
    description: >
      Edit an existing comment on a Jira issue. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      comment_id:
        type: string
        required: true
        description: "Numeric comment ID"
      comment:
        type: string
        required: true
        description: "New comment text"
      dry_run:
        type: boolean
        default: true

  - name: jira_transition_issue
    access: write
    description: >
      Transition a Jira issue to a new workflow status. Use
      jira_get_transitions first to find valid transition IDs.
      Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      transition_id:
        type: integer
        required: true
        description: "Transition ID from jira_get_transitions"
      resolution:
        type: string
        description: "Resolution name for transitions that require one (e.g. Done)"
      dry_run:
        type: boolean
        default: true

  - name: jira_assign_issue
    access: write
    description: >
      Assign a Jira issue to a user. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      assignee:
        type: string
        required: true
        description: "Assignee accountId (Cloud) or username (Server)"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_priority
    access: write
    description: >
      Set the priority of a Jira issue. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      priority:
        type: string
        required: true
        description: "Priority name (e.g. High, Medium, Low, Critical)"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_labels
    access: write
    description: >
      Set labels on a Jira issue (replaces all existing labels).
      Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      labels:
        type: array
        required: true
        items:
          type: string
        description: "Labels to set"
      dry_run:
        type: boolean
        default: true

  - name: jira_add_labels
    access: write
    description: >
      Add labels to a Jira issue (preserves existing labels).
      Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      labels:
        type: array
        required: true
        items:
          type: string
        description: "Labels to add"
      dry_run:
        type: boolean
        default: true

  - name: jira_remove_labels
    access: write
    description: >
      Remove labels from a Jira issue. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      labels:
        type: array
        required: true
        items:
          type: string
        description: "Labels to remove"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_text_field
    access: write
    description: >
      Set a text field on a Jira issue (e.g. summary, description).
      Cloud descriptions are converted to ADF automatically.
      Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      field_name:
        type: string
        required: true
        description: "Field name (e.g. summary, description, fixVersions)"
      value:
        type: string
        required: true
        description: "New value"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_custom_field
    access: write
    description: >
      Set a custom field on a Jira issue. Handles type conversion
      based on field_type (text, number, select, multi-select, user).
      Use jira_debug_fields to find field IDs. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      field_id:
        type: string
        required: true
        description: "Custom field ID (e.g. customfield_12345)"
      value:
        type: string
        required: true
        description: "Value to set"
      field_type:
        type: string
        default: "auto"
        description: "Type: text, number, select, multi-select, version, user, or auto"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_story_points
    access: write
    description: >
      Set story points on a Jira issue. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      points:
        type: number
        required: true
        description: "Story point value"
      field_id:
        type: string
        default: "customfield_10028"
        description: "Story points field ID (varies by instance)"
      dry_run:
        type: boolean
        default: true

  - name: jira_set_components
    access: write
    description: >
      Set components on a Jira issue (replaces existing).
      Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      components:
        type: array
        required: true
        items:
          type: string
        description: "Component names"
      dry_run:
        type: boolean
        default: true

  - name: jira_add_issue_link
    access: write
    description: >
      Add a link between two Jira issues. Use jira_get_link_types
      to find valid link type names. Defaults to dry_run=true.
    params:
      link_type:
        type: string
        required: true
        description: "Link type name (e.g. Blocks, Clones, Duplicates)"
      inward_issue_key:
        type: string
        required: true
        description: "Issue with the inward relationship"
      outward_issue_key:
        type: string
        required: true
        description: "Issue with the outward relationship"
      comment:
        type: string
        description: "Optional comment for the link"
      dry_run:
        type: boolean
        default: true

  - name: jira_delete_issue_link
    access: write
    description: >
      Delete an issue link by its ID.
    params:
      link_id:
        type: string
        required: true
        description: "The link ID to delete"

  - name: jira_issue_worklog
    access: write
    description: >
      Add a worklog entry to a Jira issue. Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
      time_spent:
        type: string
        required: true
        description: "Time spent (e.g. 2h 30m, 1d 4h)"
      comment:
        type: string
        description: "Optional worklog comment"
      dry_run:
        type: boolean
        default: true

  - name: jira_add_issues_to_sprint
    access: write
    description: >
      Add issues to a sprint. Defaults to dry_run=true.
    params:
      sprint_id:
        type: integer
        required: true
        description: "Sprint ID"
      issue_keys:
        type: string
        required: true
        description: "Comma-separated issue keys (e.g. PROJ-1,PROJ-2)"
      dry_run:
        type: boolean
        default: true

  - name: jira_add_issues_to_backlog
    access: write
    description: >
      Move issues to the backlog (removes from current sprint).
      Defaults to dry_run=true.
    params:
      issue_keys:
        type: string
        required: true
        description: "Comma-separated issue keys"
      dry_run:
        type: boolean
        default: true

  # --- Phase 3: Sprint Tools ---

  - name: jira_list_available_sprints
    access: read
    description: >
      List available sprints from a board or from recent tickets.
      Returns compact sprint summaries sorted by name (newest first).
    params:
      board_id:
        type: string
        description: "Board ID (if omitted, searches recent tickets)"
      state:
        type: string
        description: "Filter by state: active, closed, or future"
      limit:
        type: integer
        default: 20
        description: "Maximum sprints to return"

  - name: jira_get_sprint_issues
    access: read
    description: >
      Get issues from a sprint by name. Returns brief summaries
      by default. Supports up to 1000 results.
    params:
      sprint_name:
        type: string
        required: true
        description: "Full sprint name (e.g. 'TEAM Sprint 35')"
      max_results:
        type: integer
        default: 200
      brief:
        type: boolean
        default: true

  - name: jira_search_by_sprint
    access: read
    description: >
      Search issues in a sprint with optional assignee and status
      filters. Returns brief summaries by default.
    params:
      sprint_name:
        type: string
        required: true
        description: "Full sprint name"
      assignee:
        type: string
        description: "Filter by assignee (use 'currentUser()' for self)"
      status:
        type: string
        description: "Filter by status (e.g. Closed, In Progress)"
      max_results:
        type: integer
        default: 200
      brief:
        type: boolean
        default: true

  - name: jira_get_all_sprints
    access: read
    description: >
      Get all sprints for a board with optional state filter.
    params:
      board_id:
        type: string
        required: true
      state:
        type: string
        description: "Filter: active, closed, future"
      max_results:
        type: integer
        description: "Return only the N most recent sprints"

  - name: jira_get_all_active_sprints
    access: read
    description: >
      Get all active sprints for a board.
    params:
      board_id:
        type: string
        required: true

  - name: jira_get_sprint_details
    access: read
    description: >
      Get detailed information about a specific sprint.
    params:
      sprint_id:
        type: integer
        required: true

  - name: jira_get_sprint_report
    access: read
    description: >
      Get sprint report with metrics (Server/DC only).
      Not available on Jira Cloud.
    params:
      board_id:
        type: string
        required: true
      sprint_id:
        type: integer
        required: true

  - name: jira_get_all_agile_boards
    access: read
    description: >
      Get agile boards with compact output (id, name, type,
      projectKey). Can filter by project or board type.
    params:
      project_key:
        type: string
        description: "Filter by project key"
      board_type:
        type: string
        description: "Filter by type: scrum or kanban"

  - name: jira_get_issues_for_board
    access: read
    description: >
      Get issues for a board with brief mode.
    params:
      board_id:
        type: string
        required: true
      max_results:
        type: integer
        default: 50
      brief:
        type: boolean
        default: true

  - name: jira_get_all_issues_for_sprint_in_board
    access: read
    description: >
      Get issues for a specific sprint in a board with brief mode.
    params:
      board_id:
        type: string
        required: true
      sprint_id:
        type: integer
        required: true
      max_results:
        type: integer
        default: 200
      brief:
        type: boolean
        default: true

  # --- Phase 4: Export/Cache Tools ---

  - name: jira_export_sprint_data
    access: read
    description: >
      Export all issues for a sprint to a local JSON file.
    params:
      board_id:
        type: string
        required: true
      sprint_id:
        type: integer
        required: true
      output_file:
        type: string
        required: true
        description: "Path to write the JSON file"

  - name: jira_export_board_sprints
    access: read
    description: >
      Export all sprints for a board to a local JSON file.
    params:
      board_id:
        type: string
        required: true
      state:
        type: string
        description: "Filter: active, closed, future"
      output_file:
        type: string
        required: true

  - name: jira_export_sprint_report
    access: read
    description: >
      Export sprint report to a local JSON file (Server/DC only).
    params:
      board_id:
        type: string
        required: true
      sprint_id:
        type: integer
        required: true
      output_file:
        type: string
        required: true

  - name: jira_query_local_sprint_data
    access: read
    description: >
      Query and filter locally exported sprint data by assignee,
      status, issue type, labels, or priority.
    params:
      file_path:
        type: string
        required: true
        description: "Path to exported sprint JSON file"
      assignee:
        type: string
        description: "Filter by assignee display name (substring)"
      status:
        type: string
        description: "Filter by status name (substring)"
      issue_type:
        type: string
        description: "Filter by issue type (substring)"
      labels:
        type: array
        items:
          type: string
        description: "Filter by labels (must have all)"
      priority:
        type: string
        description: "Filter by priority (substring)"
      brief:
        type: boolean
        default: true

  - name: jira_compare_sprints
    access: read
    description: >
      Compare metrics across multiple exported sprint files.
      Returns completion rate and issue counts per sprint.
    params:
      file_paths:
        type: string
        required: true
        description: "Comma-separated paths to sprint export files"

  - name: jira_sprint_metrics_summary
    access: read
    description: >
      Generate metrics summary from an exported sprint file.
    params:
      file_path:
        type: string
        required: true

  - name: jira_read_cache_summary
    access: read
    description: >
      Read and summarize a cached/exported Jira response file.
      Extracts key fields from each issue for quick overview.
    params:
      file_path:
        type: string
        required: true
      fields:
        type: array
        items:
          type: string
        description: "Fields to extract (e.g. key, summary, status.name)"
      issue_keys:
        type: string
        description: "Comma-separated keys to filter"
      max_issues:
        type: integer
        default: 20

  - name: jira_get_issue_from_cache
    access: read
    description: >
      Get full details of a specific issue from a cached file.
      Extracts core fields into a readable flat format.
    params:
      file_path:
        type: string
        required: true
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"

  - name: jira_debug_fields
    access: read
    description: >
      List Jira custom fields. Optionally filter by name to find
      field IDs for story points, sprint, team, etc.
    params:
      search:
        type: string
        description: "Case-insensitive name substring to filter by"

  # --- Attachment Tools ---

  - name: jira_download_attachment
    access: read
    description: >
      Download a Jira attachment by ID. Returns filename, mimeType,
      and content (base64 for binary, text for text files).
    params:
      attachment_id:
        type: string
        required: true
        description: "Numeric attachment ID"

  - name: jira_add_attachment
    access: write
    description: >
      Add a file attachment to a Jira issue. Provide either
      file_path (preferred, reads from disk) or content
      (base64-encoded). Defaults to dry_run=true.
    params:
      issue_key:
        type: string
        required: true
        description: "Issue key (e.g. PROJ-123)"
      file_path:
        type: string
        description: "Path to the file on disk (preferred over content)"
      filename:
        type: string
        description: "Filename for the attachment (auto-detected from file_path)"
      content:
        type: string
        description: "File content, base64-encoded (alternative to file_path)"
      content_type:
        type: string
        default: "application/octet-stream"
        description: "MIME type (auto-detected from file_path)"
      dry_run:
        type: boolean
        default: true

  - name: jira_delete_attachment
    access: write
    description: >
      Delete a Jira attachment by ID. Defaults to dry_run=true.
    params:
      attachment_id:
        type: string
        required: true
        description: "Numeric attachment ID"
      dry_run:
        type: boolean
        default: true

setup:
  credentials:
    JIRA_URL:
      description: "Base URL of your Jira instance"
      example: "https://your-company.atlassian.net"
      secret: false
    JIRA_TOKEN:
      description: "API token (Cloud) or Personal Access Token (Server/DC)"
      help_url: "https://id.atlassian.com/manage-profile/security/api-tokens"
      instructions: >
        Cloud: Go to Atlassian API tokens page, click 'Create API token',
        give it a name, and copy the generated token.
        Server/DC: In Jira, go to Profile > Personal Access Tokens >
        Create token. Copy the generated token.
      secret: true
    JIRA_EMAIL:
      description: "Email address associated with your Atlassian account"
      example: "your-email@company.com"
      secret: false
  variants:
    cloud:
      label: "Jira Cloud (Atlassian-hosted)"
      description: "For *.atlassian.net instances"
      required: [JIRA_URL, JIRA_EMAIL, JIRA_TOKEN]
    server-token:
      label: "Jira Server / Data Center (token)"
      description: "For self-hosted Jira with Personal Access Token"
      required: [JIRA_URL, JIRA_TOKEN]
    server-kerberos:
      label: "Jira Server / Data Center (Kerberos)"
      description: "For self-hosted Jira with Kerberos/SPNEGO authentication"
      required: [JIRA_URL]
  validation_tool: jira_get_myself
  post_setup_message: "Restart the MCP server for changes to take effect."

enabled: true
priority: 10
