name: google-docs
version: "0.2.0"
description: "Google Docs — retrieve, summarize, and write to documents"

execution: persistent
handler: ./handler
credential_group: google

services:
  auth:
    type: oauth2
    token_file: token-docs.json
    credentials_file: client-credentials.json
    scopes:
      - https://www.googleapis.com/auth/documents

context_files:
  - context.md

tools:
  - name: gdocs_get_document
    access: read
    description: "Get a Google Doc's full content and structure"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"

  - name: gdocs_get_document_text
    access: read
    description: "Get a Google Doc as plain text content"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"
      save_to_file:
        type: boolean
        default: false
        description: "Save to local file"
      output_path:
        type: string
        description: "Custom output path (default: ./docs/<title>.txt)"

  - name: gdocs_get_document_markdown
    access: read
    visibility: primary
    description: "Get a Google Doc converted to Markdown format"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"
      save_to_file:
        type: boolean
        default: false
        description: "Save to local file"
      output_path:
        type: string
        description: "Custom output path (default: ./docs/<title>.md)"

  - name: gdocs_summarize_document
    access: read
    description: "Get a concise summary of a Google Doc's content and structure"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"
      include_structure:
        type: boolean
        default: true
        description: "Include document structure analysis (headings, lists, tables)"

  - name: gdocs_extract_and_get_from_text
    access: read
    description: "Extract Google Docs links from text and fetch their content"
    params:
      text:
        type: string
        required: true
        description: "Text to scan for Google Docs URLs"
      max_docs:
        type: integer
        default: 5
        description: "Maximum number of documents to fetch"

  - name: gdocs_write_text
    access: write
    visibility: primary
    description: "Write or append text to a Google Doc with optional markdown formatting"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"
      text:
        type: string
        required: true
        description: "Text content to write"
      is_markdown:
        type: boolean
        default: true
        description: "Parse text as markdown and apply rich formatting (headings, bold, italic, underline, links)"
      append_to_end:
        type: boolean
        default: true
        description: "Append text to the end of the document"
      insert_index:
        type: integer
        default: 0
        description: "Character index for insertion (used if append_to_end is false)"

  - name: gdocs_write_markdown
    access: write
    description: "Write Markdown-formatted text to a Google Doc with rich formatting (headings, bold, italic, links, etc.)"
    params:
      document_id_or_url:
        type: string
        required: true
        description: "Document ID or Google Docs URL"
      markdown:
        type: string
        required: true
        description: "Markdown content to write"
      append_to_end:
        type: boolean
        default: false
        description: "Append text to the end of the document"
      insert_index:
        type: integer
        default: 0
        description: "Character index for insertion (used if append_to_end is false)"

  - name: gdocs_create_document
    access: write
    visibility: primary
    description: "Create a new Google Doc with a specified title"
    params:
      title:
        type: string
        required: true
        description: "Title for the new document"
